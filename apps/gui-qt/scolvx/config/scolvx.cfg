# scolvx default configuration
# See scolvx documentation for parameter descriptions.

# Number of days to preload events from the database.
loadEventDB = 1

# Locator display settings.
olv.Pvel = 6.0
olv.drawMapLines = true
olv.drawGridLines = true
olv.computeMissingTakeOffAngles = true

# Magnitude computation after relocation.
olv.computeMagnitudesAfterRelocate = false
olv.computeMagnitudesSilently = false
olv.enableMagnitudeSelection = true

# System tray icon.
olv.systemTray = true
