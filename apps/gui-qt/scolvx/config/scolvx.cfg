# scolvx default configuration
# See scolvx documentation for parameter descriptions.

# Number of days to preload events from the database.
loadEventDB = 1

# Locator display settings.
olv.Pvel = 6.0
olv.drawMapLines = true
olv.drawGridLines = true
olv.computeMissingTakeOffAngles = true

# Magnitude computation after relocation.
olv.computeMagnitudesAfterRelocate = false
olv.computeMagnitudesSilently = false
olv.enableMagnitudeSelection = true

# System tray icon.
olv.systemTray = true

# Event list highlighting.
# Each named rule defines a condition and the colours to apply to matching
# event rows. The first matching rule wins. Remove a name from the list or
# comment out its block to disable that rule.
#
# Supported condition keys (values are case-insensitive):
#   type              — event type      (e.g. earthquake, not-existing,
#                                         outside-of-network-interest, quarry-blast)
#   evaluationStatus  — origin status   (e.g. preliminary, confirmed, reviewed,
#                                         final, rejected)
#   evaluationMode    — origin mode     (e.g. automatic, manual)
#   typeCertainty     — event certainty (e.g. known, suspected, none)
#
eventlist.highlight = preliminary-earthquake, automatic, rejected-uncertain

# Events assessed by a duty seismologist but still requiring action.
eventlist.highlight.preliminary-earthquake.condition  = "type=earthquake && evaluationStatus=preliminary"
eventlist.highlight.preliminary-earthquake.background = 255,165,0
eventlist.highlight.preliminary-earthquake.foreground = 0,0,0

# Any automatic origin (not yet reviewed).
eventlist.highlight.automatic.condition  = "evaluationMode=automatic"
eventlist.highlight.automatic.background = 255,200,0
eventlist.highlight.automatic.foreground = 0,0,0

# Rejected origins with no type certainty set.
eventlist.highlight.rejected-uncertain.condition  = "evaluationStatus=rejected && typeCertainty=none"
eventlist.highlight.rejected-uncertain.background = 200,100,0
eventlist.highlight.rejected-uncertain.foreground = 255,255,255
